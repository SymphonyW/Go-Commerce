syntax = "proto3";

package cart;

option go_package = "./";

message CartItem {
  int64 product_id = 1;
  string product_name = 2;
  float price = 3;
  int32 quantity = 4;
  string image_url = 5;
}

message AddCartItemRequest {
  int64 user_id = 1;
  int64 product_id = 2;
  int32 quantity = 3;
}

message AddCartItemResponse {
  CartItem item = 1;
}

message GetCartRequest {
  int64 user_id = 1;
}

message GetCartResponse {
  repeated CartItem items = 1;
  float total_amount = 2;
}

message UpdateCartItemRequest {
  int64 user_id = 1;
  int64 product_id = 2;
  int32 quantity = 3;
}

message UpdateCartItemResponse {
  CartItem item = 1;
}

message RemoveCartItemRequest {
  int64 user_id = 1;
  int64 product_id = 2;
}

message RemoveCartItemResponse {
  bool success = 1;
}

message ClearCartRequest {
  int64 user_id = 1;
}

message ClearCartResponse {
  bool success = 1;
}

service CartService {
  rpc AddCartItem(AddCartItemRequest) returns (AddCartItemResponse);
  rpc GetCart(GetCartRequest) returns (GetCartResponse);
  rpc UpdateCartItem(UpdateCartItemRequest) returns (UpdateCartItemResponse);
  rpc RemoveCartItem(RemoveCartItemRequest) returns (RemoveCartItemResponse);
  rpc ClearCart(ClearCartRequest) returns (ClearCartResponse);
}
